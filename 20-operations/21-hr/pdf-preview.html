<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>NDA PDF Preview</title>
<style>
body{margin:0;background:#333;font-family:sans-serif;color:#fff;text-align:center}
.tabs{padding:12px;display:flex;justify-content:center;gap:12px}
.tabs button{padding:8px 20px;background:#555;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px}
.tabs button.active{background:#6C5CE7}
iframe{width:90%;height:calc(100vh - 60px);border:none;background:#fff}
</style></head><body>
<div class="tabs">
  <button class="active" onclick="show('A')">TYPE A</button>
  <button onclick="show('B')">TYPE B</button>
  <button onclick="show('C')">TYPE C</button>
</div>
<iframe id="viewer" src="NDA-TYPE-A-%EC%8B%A0%EA%B7%9C%EC%9E%85%EC%82%AC%EC%9E%90.pdf"></iframe>
<script>
const files={A:'NDA-TYPE-A-%EC%8B%A0%EA%B7%9C%EC%9E%85%EC%82%AC%EC%9E%90.pdf',B:'NDA-TYPE-B-%EA%B8%B0%EC%A1%B4%EC%A7%81%EC%9B%90.pdf',C:'NDA-TYPE-C-%EC%99%B8%EB%B6%80%EA%B3%84%EC%95%BD%EC%A7%81.pdf'};
function show(t){document.getElementById('viewer').src=files[t];document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}
</script></body></html>
