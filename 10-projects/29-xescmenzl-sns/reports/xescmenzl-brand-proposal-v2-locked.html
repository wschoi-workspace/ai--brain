<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XESC MENZL Brand Strategy — Protected</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard Variable',system-ui,sans-serif; background:#111; color:#F5F0EB; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .lock-container { text-align:center; max-width:480px; padding:60px 40px; }
  .lock-icon { font-size:48px; margin-bottom:24px; opacity:0.6; }
  .lock-title { font-size:28px; font-weight:200; letter-spacing:-0.5px; margin-bottom:8px; }
  .lock-sub { font-size:14px; color:#7A7570; margin-bottom:40px; line-height:1.6; }
  .lock-input {
    width:100%; padding:14px 18px; background:#1A1A1A; border:1px solid #333;
    color:#F5F0EB; font-size:15px; font-family:inherit; font-weight:300;
    letter-spacing:0.05em; text-align:center; outline:none;
    transition: border-color 250ms;
  }
  .lock-input:focus { border-color:#6C5CE7; }
  .lock-input::placeholder { color:#7A7570; }
  .lock-btn {
    width:100%; padding:14px; margin-top:12px; background:#6C5CE7; border:none;
    color:#111; font-size:12px; font-weight:500; letter-spacing:0.25em;
    text-transform:uppercase; cursor:pointer; font-family:inherit;
    transition: background 150ms;
  }
  .lock-btn:hover { background:#8577ED; }
  .lock-error { color:#E17055; font-size:13px; margin-top:12px; display:none; }
  .lock-expired { color:#E17055; }
  .lock-meta { font-size:11px; color:#7A7570; margin-top:32px; letter-spacing:0.1em; }
  .lock-brand { font-size:11px; color:#333; letter-spacing:0.3em; text-transform:uppercase; margin-top:48px; }
</style>
</head>

<div class="lock-container" id="lockScreen">
  <div class="lock-icon">&#x1F512;</div>
  <div class="lock-title">Protected Document</div>

    열람 권한이 있는 분만 접근할 수 있습니다.
  </div>
  <input type="password" class="lock-input" id="pwInput" placeholder="비밀번호 입력" autocomplete="off">
  <button class="lock-btn" id="unlockBtn" onclick="unlock()">UNLOCK</button>
  <div class="lock-error" id="errMsg">비밀번호가 올바르지 않습니다.</div>

  <div class="lock-brand">Project Rent</div>
</div>

<script>
var EXPIRY = "2026-07-09";
var HASH = "projectrent2026";

(function() {
  var now = new Date().toISOString().slice(0,10);
  if (now > EXPIRY) {
    document.getElementById("lockMsg").innerHTML = '<span class="lock-expired">이 문서의 열람 기한이 만료되었습니다.<br>재발급이 필요하면 ws.choi@project-rent.com으로 연락해 주세요.</span>';
    document.getElementById("pwInput").disabled = true;
    document.getElementById("unlockBtn").disabled = true;
    document.getElementById("unlockBtn").style.opacity = "0.3";
    document.getElementById("unlockBtn").style.cursor = "not-allowed";
  }
})();

document.getElementById("pwInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

function unlock() {
  var input = document.getElementById("pwInput").value;
  if (input === HASH) {
    try {
      var b64 = document.getElementById("payload").textContent;
      var binary = atob(b64);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      var decoded = new TextDecoder("utf-8").decode(bytes);
      document.open();
      document.write(decoded);
      document.close();
    } catch(e) {
      document.getElementById("errMsg").style.display = "block";
      document.getElementById("errMsg").textContent = "문서 복원 중 오류: " + e.message;
    }
  } else {
    document.getElementById("errMsg").style.display = "block";
    document.getElementById("pwInput").value = "";
    document.getElementById("pwInput").focus();
    setTimeout(function() { document.getElementById("errMsg").style.display = "none"; }, 3000);
  }
}
</script>
