<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RXR SNS Analysis — 비밀번호 필요</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard Variable',system-ui,sans-serif;background:linear-gradient(135deg,#f8f7ff,#eef2ff);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.lock-container{background:#fff;border-radius:24px;padding:48px 40px;box-shadow:0 20px 60px rgba(102,102,255,0.15);text-align:center;max-width:420px;width:90%;}
.lock-icon{font-size:64px;margin-bottom:16px;}
.lock-title{font-size:22px;font-weight:800;color:#262626;margin-bottom:8px;}
.lock-sub{font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.6;}
.lock-input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:12px;font-size:15px;font-family:'Pretendard Variable',sans-serif;outline:none;transition:border-color 0.2s;text-align:center;letter-spacing:2px;}
.lock-input:focus{border-color:#6666FF;}
.lock-input.error{border-color:#ef4444;animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}
.lock-btn{width:100%;padding:14px;background:linear-gradient(135deg,#5353FF,#8A8AFF);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;font-family:'Pretendard Variable',sans-serif;transition:transform 0.1s;}
.lock-btn:hover{transform:scale(1.02);}
.lock-btn:active{transform:scale(0.98);}
.lock-error{color:#ef4444;font-size:12px;margin-top:8px;min-height:18px;}
.lock-footer{font-size:11px;color:#94a3b8;margin-top:24px;}
</style></head><body>
<div class="lock-container">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">비밀번호가 필요합니다</div>
  <div class="lock-sub">비욘드 팝업스토어 RXR SNS 분석 리포트<br>비밀번호를 입력해주세요</div>
  <input type="password" class="lock-input" id="pwInput" placeholder="비밀번호 입력" onkeypress="if(event.key==='Enter')unlock()">
  <button class="lock-btn" onclick="unlock()">열기</button>
  <div class="lock-error" id="errMsg"></div>
  <div class="lock-footer">Project RENT · R-lab</div>
</div>
