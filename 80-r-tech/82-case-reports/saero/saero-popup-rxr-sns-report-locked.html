// Password hash (SHA-256 of "rxr2026")
// Change this hash to change the password
var PH="11b14caf2405e3e4fa4c0831b5a351e826b8d7359bb1244faba9c3ff8b0d857d";

async function sha256(msg){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function unlock(){
  var pw=document.getElementById('pwInput').value;
  var hash=await sha256(pw);
  if(hash===PH){
    var b64=EC.join('');
    var decoded=atob(b64);
    var bytes=new Uint8Array(decoded.length);
    for(var i=0;i<decoded.length;i++)bytes[i]=decoded.charCodeAt(i);
    var html=new TextDecoder('utf-8').decode(bytes);
    document.open();document.write(html);document.close();
  }else{
    var inp=document.getElementById('pwInput');
    inp.classList.add('error');
    document.getElementById('errorMsg').textContent='비밀번호가 올바르지 않습니다.';
    setTimeout(function(){inp.classList.remove('error');},400);
    inp.value='';inp.focus();
  }
}

document.getElementById('pwInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')unlock();
});
