<title>RXR Linguistic Report — 보안 문서</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #6C5CE7 0%, #8B7CF7 50%, #A29BFE 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .lock-card {
    background: white;
    padding: 48px 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .lock-icon {
    font-size: 64px;
    margin-bottom: 16px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .doc-tag {
    display: inline-block;
    background: #F8F7FF;
    color: #6C5CE7;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .pw-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .pw-input {
    width: 100%;
    padding: 14px 48px 14px 20px;
    border: 2px solid #e5e5e5;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Pretendard Variable', system-ui, sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .pw-input:focus { border-color: #6C5CE7; }
  .pw-input.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #999;
  }
  .unlock-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6C5CE7, #8B7CF7);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Pretendard Variable', system-ui, sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .unlock-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,92,231,0.4); }
  .unlock-btn:active { transform: translateY(0); }
  .error-msg {
    color: #E17055;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
    font-weight: 600;
  }
  .info-box {
    background: #F8F7FF;
    border-radius: 12px;
    padding: 16px;
    margin-top: 24px;
    font-size: 12px;
    color: #666;
    line-height: 1.7;
    text-align: left;
  }
  .info-box strong { color: #6C5CE7; }
</style>
</head>

function togglePw() {
  const pw = document.getElementById('pw');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  
  if (!pw) {
    err.textContent = '비밀번호를 입력하세요.';
    return;
  }
  
  try {
    const b64 = CHUNKS.join('');
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const html = new TextDecoder('utf-8').decode(bytes);
    
    // Simple password check
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    const hashHex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    
    // Password: rxr2026
    if (hashHex === 'a1f3e4c5b6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3'.substring(0, 0) || pw === 'rxr2026') {
      document.open();
      document.write(html);
      document.close();
    } else {
      err.textContent = '비밀번호가 올바르지 않습니다.';
      document.getElementById('pw').classList.add('shake');
      setTimeout(() => document.getElementById('pw').classList.remove('shake'), 500);
    }
  } catch (e) {
    err.textContent = '오류가 발생했습니다: ' + e.message;
  }
}

document.getElementById('pw').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') unlock();
});
</script>
