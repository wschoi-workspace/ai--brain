  var today=new Date(); var exp=new Date(EXPIRY+"T23:59:59");

    var bin=atob(DATA);var bytes=new Uint8Array(bin.length);

    var html=new TextDecoder('utf-8').decode(bytes);
    document.open();document.write(html);document.close();
